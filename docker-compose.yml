version: "3.9"

networks:
  sso-net:
    external: true
    name: sso-lab_sso-net
  dev-net:
    external: true
    name: dev-net

services:

  backend:
    build: ./backend
    container_name: lab-admin-backend
    restart: unless-stopped
    env_file: .env
    ports:
      - "8083:8000"
    networks:
      - sso-net
      - dev-net
    volumes:
      - ./backend:/app
      # Registre des ports + .keycloak-client-opts de chaque app — non secrets
      # (le code ne doit JAMAIS lire un .env d'app depuis /mnt/dev, seulement
      # .keycloak-client-opts ; voir api/infrastructure.py et api/lab_groups.py).
      - ../.ports:/mnt/ports:ro
      - ../:/mnt/dev:ro
    labels:
      caddy: "${DOMAIN}"
      caddy.handle_path: "/lab-admin-api/*"
      caddy.handle_path.reverse_proxy: "{{upstreams 8000}}"

  frontend:
    build: ./frontend
    container_name: lab-admin-frontend
    restart: unless-stopped
    env_file: .env
    ports:
      - "4201:80"
    networks:
      - sso-net
    volumes:
      - ./frontend/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./frontend/nginx-entrypoint.sh:/docker-entrypoint.d/40-env-config.sh:ro
    labels:
      caddy: "${DOMAIN}"
      caddy.handle_path: "/lab-admin/*"
      caddy.handle_path.reverse_proxy: "{{upstreams 80}}"
